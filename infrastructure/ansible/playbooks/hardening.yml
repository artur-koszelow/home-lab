---
- name: Automatic Security Updates
  hosts: control_node, rpi_server
  become: true
  tasks:
    # ==========================================
    # Automatic Security Updates Configuration
    # ==========================================
    - name: Install unattended-upgrades package
      ansible.builtin.apt:
        name: unattended-upgrades
        state: present

    - name: Enable periodic update and upgrade tasks
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        owner: root
        group: root
        mode: '0644'
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
          APT::Periodic::AutocleanInterval "7";

- name: Security Hardening (SSH, fail2ban, Kernel, Updates)
  hosts: rpi_server
  become: true

  handlers:
    - name: Restart ssh
      ansible.builtin.service:
        name: ssh
        state: restarted

    - name: Restart fail2ban
      ansible.builtin.service:
        name: fail2ban
        state: restarted

  tasks:
    # ==========================================
    # 1. SSH Hardening
    # ==========================================
    - name: Disable password-based authentication for SSH
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
        state: present
      notify: Restart ssh

    - name: Disable root login via SSH
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
        state: present
      notify: Restart ssh

    - name: Restrict SSH access to the authorised user only
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?AllowUsers'
        line: "AllowUsers {{ ansible_user }}"
        state: present
        validate: '/usr/sbin/sshd -t -f %s'
      notify: Restart ssh

    - name: Limit maximum authentication attempts per connection
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?MaxAuthTries'
        line: 'MaxAuthTries 3'
        state: present
        validate: '/usr/sbin/sshd -t -f %s'
      notify: Restart ssh

    - name: Reduce login grace time to drop unauthenticated connections faster
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?LoginGraceTime'
        line: 'LoginGraceTime 30'
        state: present
        validate: '/usr/sbin/sshd -t -f %s'
      notify: Restart ssh

    - name: Set idle session keepalive interval (seconds)
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?ClientAliveInterval'
        line: 'ClientAliveInterval 300'
        state: present
        validate: '/usr/sbin/sshd -t -f %s'
      notify: Restart ssh

    - name: Set max unanswered keepalive probes before disconnecting idle session
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?ClientAliveCountMax'
        line: 'ClientAliveCountMax 2'
        state: present
        validate: '/usr/sbin/sshd -t -f %s'
      notify: Restart ssh

    - name: Disable X11 forwarding
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?X11Forwarding'
        line: 'X11Forwarding no'
        state: present
        validate: '/usr/sbin/sshd -t -f %s'
      notify: Restart ssh

    - name: Restrict SSH to strong ciphers only
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?Ciphers '
        line: 'Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com'
        state: present
        validate: '/usr/sbin/sshd -t -f %s'
      notify: Restart ssh

    - name: Restrict SSH to strong MACs only
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?MACs '
        line: 'MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com'
        state: present
        validate: '/usr/sbin/sshd -t -f %s'
      notify: Restart ssh

    - name: Restrict SSH to strong key exchange algorithms only
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?KexAlgorithms '
        line: 'KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group16-sha512,diffie-hellman-group18-sha512'
        state: present
        validate: '/usr/sbin/sshd -t -f %s'
      notify: Restart ssh

    # ==========================================
    # 2. fail2ban — SSH Brute-Force Protection
    # ==========================================
    - name: Install fail2ban
      ansible.builtin.apt:
        name: fail2ban
        state: present

    - name: Deploy custom fail2ban SSH jail configuration
      ansible.builtin.copy:
        dest: /etc/fail2ban/jail.local
        owner: root
        group: root
        mode: '0644'
        content: |
          [DEFAULT]
          # Ban for 1 hour after 3 failed attempts within 10 minutes
          bantime  = 1h
          findtime = 10m
          maxretry = 3
          # Use systemd journal as log backend (RPi OS Bookworm / Debian 12)
          backend  = systemd

          [sshd]
          enabled = true
          port    = ssh
          logpath = %(sshd_log)s
      notify: Restart fail2ban

    - name: Ensure fail2ban service is started and enabled on boot
      ansible.builtin.service:
        name: fail2ban
        state: started
        enabled: true

    # ==========================================
    # 3. Kernel Hardening (sysctl)
    # ==========================================
    - name: Apply and persist kernel hardening sysctl parameters
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        sysctl_file: /etc/sysctl.d/99-hardening.conf
        reload: true
      loop:
        # Reverse path filtering — drops packets with spoofed source IPs
        - { key: 'net.ipv4.conf.all.rp_filter', value: '1' }
        - { key: 'net.ipv4.conf.default.rp_filter', value: '1' }
        # Ignore ICMP redirects — prevents routing manipulation (MITM)
        - { key: 'net.ipv4.conf.all.accept_redirects', value: '0' }
        - { key: 'net.ipv4.conf.default.accept_redirects', value: '0' }
        - { key: 'net.ipv4.conf.all.send_redirects', value: '0' }
        # Ignore broadcast pings — Smurf DDoS attack mitigation
        - { key: 'net.ipv4.icmp_echo_ignore_broadcasts', value: '1' }
        # SYN cookie protection against SYN flood attacks
        - { key: 'net.ipv4.tcp_syncookies', value: '1' }
        # Restrict kernel log (dmesg) to root only
        - { key: 'kernel.dmesg_restrict', value: '1' }
        # Disable core dumps for setuid programs
        - { key: 'fs.suid_dumpable', value: '0' }
